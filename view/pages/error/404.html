<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Página não encontrada — 404</title>
  <meta name="robots" content="noindex" />
  <style>
    :root {
      --bg: #0f1115;
      --text: #cbd5e1;
      --muted: #8b98a5;
      --accent: #7c3aed;
      --button-bg: #1f2937;
      --button-text: #e5e7eb;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
    }

    body {
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, 'DM Sans', 'Helvetica Neue', Arial, 'Noto Sans', 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol', sans-serif;
      padding: 24px;
    }

    main {
      text-align: center;
      max-width: 560px;
    }

    h1 {
      font-size: 64px;
      line-height: 1;
      margin-bottom: 8px;
    }

    p {
      color: var(--muted);
      margin-bottom: 24px;
    }

    a.button {
      display: inline-block;
      padding: 12px 16px;
      border-radius: 8px;
      background: var(--button-bg);
      color: var(--button-text);
      text-decoration: none;
      transition: transform .1s ease;
    }

    a.button:hover {
      transform: translateY(-1px);
    }
  </style>
  <link rel="icon" href="/img/favicon.png">
</head>

<body>
  <main>
    <h1>404</h1>
    <p>A página que você procura foi movida, removida ou nunca existiu.</p>
    <a class="button" href="/">Voltar para o início</a>
  </main>
</body>

</html>
